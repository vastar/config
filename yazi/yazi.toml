#:schema https://yazi-rs.github.io/schemas/yazi.json

[mgr]
ratio = [0, 1, 1]
sort_by = "extension"
linemode = "size_and_mtime"
show_hidden = false

[preview]
max_width = 1920
max_height = 1080

[[opener.edit]]
run = "$EDITOR %s"
block = true
for = "unix"

[[opener.edit]]
run = "%EDITOR% %s"
block = true
for = "windows"

[[opener.image]]
run = "imv-dir %s"
orphan = true
for = "unix"

[[opener.image_edit]]
run = "gimp %s"
orphan = true
for = "unix"

[[opener.audio]]
run = "mpv %s"
orphan = true
for = "unix"

[[opener.video]]
run = "mpv %s"
orphan = true
for = "unix"

[[open.prepend_rules]]
mime = "image/*"
use = ["image", "image_edit"]

[[open.prepend_rules]]
mime = "audio/*"
use = "audio"

[[open.prepend_rules]]
mime = "video/*"
use = "video"

[[plugin.prepend_previewers]]
mime = "video/*"
run = "file"

[[plugin.prepend_preloaders]]
mime = "video/*"
run = "noop"

[[plugin.prepend_fetchers]]
url   = "*"
run   = "git"
group = "git"

[[plugin.prepend_fetchers]]
url   = "*/"
run   = "git"
group = "git"
